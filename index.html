/* ===========================
   CSS DIMULAI DARI SINI
=========================== */


/*==================================================
ROOT
==================================================*/

:root{

--primary:#FFD54A;
--secondary:#FFB300;

--dark:#0b0b0b;
--dark2:#151515;

--white:#ffffff;
--text:#dddddd;

--glass:rgba(255,255,255,.08);
--glassBorder:rgba(255,255,255,.12);

--radius:24px;

--shadow:

0 20px 60px rgba(0,0,0,.35);

--transition:.35s ease;

}

/*==================================================
RESET
==================================================*/

*{

margin:0;

padding:0;

box-sizing:border-box;

}

html{

scroll-behavior:smooth;

}

body{

background:var(--dark);

color:var(--white);

font-family:'Poppins',sans-serif;

overflow-x:hidden;

line-height:1.7;

}

img{

display:block;

max-width:100%;

height:auto;

}

a{

text-decoration:none;

color:inherit;

}

button{

font-family:inherit;

border:none;

outline:none;

cursor:pointer;

}

ul{

list-style:none;

}

/*==================================================
CONTAINER
==================================================*/

.container{

width:92%;

max-width:1200px;

margin:auto;

}

/*==================================================
SECTION
==================================================*/

section{

padding:80px 0;

position:relative;

}

.section-title{

font-size:38px;

font-weight:700;

margin-bottom:15px;

text-align:center;

}

.section-subtitle{

font-size:16px;

color:var(--text);

text-align:center;

margin-bottom:45px;

}

/*==================================================
CARD PREMIUM
==================================================*/

.card{

background:var(--glass);

backdrop-filter:blur(18px);

border:1px solid var(--glassBorder);

border-radius:var(--radius);

box-shadow:var(--shadow);

padding:30px;

}

/*==================================================
BUTTON
==================================================*/

.btn{

display:inline-flex;

align-items:center;

justify-content:center;

gap:10px;

padding:15px 32px;

border-radius:999px;

background:linear-gradient(
135deg,
var(--primary),
var(--secondary)
);

color:#111;

font-weight:700;

transition:var(--transition);

}

.btn:hover{

transform:translateY(-4px);

box-shadow:

0 15px 35px rgba(255,193,7,.35);

}

/*==================================================
TEXT
==================================================*/

h1,h2,h3,h4{

font-weight:700;

line-height:1.3;

}

p{

color:var(--text);

}

/*==================================================
RESPONSIVE
==================================================*/

@media(max-width:768px){

section{

padding:60px 0;

}

.section-title{

font-size:30px;

}

.section-subtitle{

font-size:15px;

}

.container{

width:94%;

}

.card{

padding:22px;

}

}

/*==================================================
HEADER
==================================================*/

header{

position:relative;

padding:35px 0 80px;

overflow:hidden;

}

/* Background Glow */

header::before{

content:"";

position:absolute;

width:420px;

height:420px;

background:#FFD54A;

filter:blur(180px);

opacity:.18;

top:-180px;

left:-120px;

border-radius:50%;

pointer-events:none;

}

header::after{

content:"";

position:absolute;

width:350px;

height:350px;

background:#ff9800;

filter:blur(160px);

opacity:.15;

bottom:-150px;

right:-100px;

border-radius:50%;

pointer-events:none;

}

/*==================================================
LOGO
==================================================*/

.logo{

width:170px;

margin:auto;

margin-bottom:30px;

position:relative;

z-index:2;

transition:.35s;

}

.logo img{

width:100%;

display:block;

}

.logo:hover{

transform:scale(1.05);

}

/*==================================================
BANNER
==================================================*/

.banner{

position:relative;

border-radius:28px;

overflow:hidden;

box-shadow:

0 25px 70px rgba(0,0,0,.45);

z-index:2;

}

.banner img{

width:100%;

display:block;

transition:1.2s;

}

.banner:hover img{

transform:scale(1.04);

}

/*==================================================
EVENT CARD
==================================================*/

.event-card{

position:relative;

margin:-55px auto 0;

max-width:980px;

padding:35px;

border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.12);

box-shadow:

0 25px 60px rgba(0,0,0,.35);

z-index:10;

}

/*==================================================
TITLE
==================================================*/

.event-title{

font-size:38px;

font-weight:800;

margin-bottom:28px;

line-height:1.3;

}

/*==================================================
INFO LIST
==================================================*/

.event-info{

display:flex;

align-items:flex-start;

gap:18px;

margin-bottom:18px;

}

.event-icon{

width:46px;

height:46px;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

background:rgba(255,255,255,.08);

font-size:20px;

flex-shrink:0;

}

.event-text{

font-size:17px;

color:#f4f4f4;

line-height:1.7;

}

/*==================================================
BUTTON MAP
==================================================*/

.btn-map{

display:inline-flex;

align-items:center;

justify-content:center;

gap:10px;

margin-top:18px;

padding:16px 34px;

border-radius:50px;

background:linear-gradient(
135deg,
#FFD54A,
#FFB300);

font-weight:700;

color:#111;

transition:.35s;

box-shadow:

0 18px 35px rgba(255,193,7,.30);

}

.btn-map:hover{

transform:translateY(-4px);

}

/*==================================================
CREATOR
==================================================*/

.creator{

margin-top:35px;

padding-top:25px;

border-top:1px solid rgba(255,255,255,.08);

font-size:15px;

color:#d9d9d9;

}

.creator strong{

display:block;

margin-top:8px;

font-size:18px;

font-weight:700;

color:#fff;

}

/*==================================================
RESPONSIVE
==================================================*/

@media(max-width:768px){

header{

padding:25px 0 50px;

}

.logo{

width:130px;

}

.event-card{

}

.event-title{

}

.event-text{

font-size:15px;

}

height:40px;

}

}

}

/*==================================================
NAVIGASI STICKY
==================================================*/

.navbar{

position:sticky;

top:0;

left:0;

width:100%;

z-index:999;

background:rgba(12,12,12,.85);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,.08);

transition:.35s;

}

.navbar.scrolled{

background:rgba(8,8,8,.95);

box-shadow:0 10px 35px rgba(0,0,0,.35);

/*==================================================
NAV CONTAINER
==================================================*/

.nav-container{

max-width:1200px;

margin:auto;

padding:14px 20px;

display:flex;

justify-content:center;

align-items:center;

gap:14px;

flex-wrap:wrap;

}

/*==================================================
NAV LINK
==================================================*/

.nav-link{

display:flex;

align-items:center;

justify-content:center;

padding:12px 22px;

border-radius:999px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

color:#ffffff;

font-size:15px;

font-weight:600;

transition:.35s;

cursor:pointer;

}

.nav-link:hover{

background:linear-gradient(
135deg,
#FFD54A,
#FFB300
);

color:#111;

transform:translateY(-3px);

box-shadow:

0 12px 28px rgba(255,193,7,.25);

}

.nav-link.active{

background:linear-gradient(
135deg,
#FFD54A,
#FFB300
);

color:#111;

font-weight:700;

box-shadow:

0 12px 28px rgba(255,193,7,.35);

}

/*==================================================
SMOOTH INDICATOR
==================================================*/

.nav-link::after{

content:"";

position:absolute;

bottom:-5px;

left:50%;

width:0;

height:3px;

border-radius:50px;

background:#FFD54A;

transition:.35s;

transform:translateX(-50%);

}

.nav-link{

position:relative;

overflow:hidden;

}

.nav-link:hover::after{

}

.nav-link.active::after{

RESPONSIVE
